            let tx=x+mdx,ty=y+mdy,moved=false;
            if(get(tx,ty)===EMPTY&&nextGrid[idx(tx,ty)]===EMPTY&&queenWithinHome(tx,ty,hx,hy,8)&&(!worldAntBoundariesOn||get(tx,ty)!==EL.ANT_BOUNDARY.id)) moved=true;
            else{
              const tg=get(tx,ty);
              if(tg===EL.ANT.id||tg===EL.ANT_CARRY.id||tg===EL.ANT_EGG.id||tg===EL.ANT_EGG_CARRY.id){
                const tx2=tx+mdx,ty2=ty+mdy;
                if(inB(tx2,ty2)&&get(tx2,ty2)===EMPTY&&nextGrid[idx(tx2,ty2)]===EMPTY&&queenWithinHome(tx2,ty2,hx,hy,8)){ tx=tx2;ty=ty2;moved=true; }
              }
            }
            if(moved){
              const di=idx(tx,ty);
              nextGrid[di]=EL.QUEEN_ANT.id; nextTemp[di]=nextTemp[i]; nextGrid[i]=EMPTY;
              updated[i]=1; updated[di]=1;
              queenHomeSet[di]=1; queenHomeX[di]=hx; queenHomeY[di]=hy; queenHomeSet[i]=0;
              extra[di]=extra[i]; qx=tx; qy=ty;
            }
          }
        }
        for(let dy=-3;dy<=3;dy++) for(let dx=-3;dx<=3;dx++){
          if(dx*dx+dy*dy>9) continue;
          const tx=qx+dx,ty=qy+dy;
          if(!inB(tx,ty)||get(tx,ty)!==EL.BREAD_CRUMBS.id) continue;
          const ni=idx(tx,ty);
          nextGrid[ni]=Math.random()<0.01?EL.KING_ANT.id:EL.ANT_EGG.id;
          nextTemp[ni]=20;
          extra[ni]=0;
        }
      }
      else if(el===EL.ANT_EGG.id){
        if(T>180&&Math.random()<.04){nextGrid[i]=EL.ASH.id;continue;}
        extra[i]=Math.min(255,extra[i]+1);
        if(extra[i]>80&&Math.random()<.08){nextGrid[i]=EL.ANT.id;extra[i]=0;continue;}
      }
      else if(el===EL.KING_ANT.id){
        if(T>200&&Math.random()<.03){nextGrid[i]=EL.ASH.id;continue;}
        extra[i]=Math.min(255,extra[i]+1);
        if(gravDown&&canReplace(x,y+1,el)&&Math.random()<.55){move(x,y,x,y+1);continue;}
        let dx=[-1,1,0][Math.floor(Math.random()*3)];
        let dy=Math.random()<.18?(Math.random()<.5?-1:1):0;
        if(!tryCreatureStep(x,y,el,dx,0)) if(!tryCreatureStep(x,y,el,dx,dy)) tryAntClimb(x,y,el);
        // After wandering for a bit, king settles and becomes a queen.
        if(extra[i]>120&&Math.random()<.05){nextGrid[i]=EL.QUEEN_ANT.id;extra[i]=0;continue;}
      }
      else if(el===EL.ICE.id){
        nextTemp[i]=clampT(Math.min(T,-10));
        // Melt when hot (from diffusion or adjacent hot elements)
        if(T>0&&Math.random()<.12){nextGrid[i]=EL.WATER.id;nextTemp[i]=5;continue;}
        for(const[dx,dy] of DIRS4){
          const n=get(x+dx,y+dy),ni=idx(x+dx,y+dy);
          if(n===EL.PLASMA.id||n===EL.LAVA.id||n===EL.FIRE.id||n===EL.EMBER.id||n===EL.HEATER.id||n===EL.MOLTEN.id||n===EL.MAGMA.id){
            nextTemp[i]=clampT(nextTemp[i]+(n===EL.PLASMA.id?400:n===EL.LAVA.id||n===EL.MOLTEN.id?120:60));
            if(Math.random()<.25){nextGrid[i]=EL.WATER.id;nextTemp[i]=30;continue;}
          }
          if(n===EL.WATER.id&&getT(x+dx,y+dy)<0&&Math.random()<.04){nextGrid[ni]=EL.ICE.id;nextTemp[ni]=-10;}
          if((n===EL.FIRE.id||n===EL.EMBER.id)&&Math.random()<.15)nextGrid[ni]=EMPTY;
          if(n===EL.SALT.id&&Math.random()<.08){nextGrid[i]=EL.SALTWATER.id;nextTemp[i]=2;nextGrid[ni]=EL.SALTWATER.id;} // salt + ice = salt water
          if(n===EL.NITROGEN.id)nextTemp[i]=clampT(T-30); // nitrogen makes it colder
        }
        for(let dy2=-3;dy2<=3;dy2++) for(let dx2=-3;dx2<=3;dx2++) if(inB(x+dx2,y+dy2)){
          const dist=Math.sqrt(dx2*dx2+dy2*dy2)||1;
          nextTemp[idx(x+dx2,y+dy2)]=clampT(nextTemp[idx(x+dx2,y+dy2)]-10/dist);
        }
      }
      else if(el===EL.HEATER.id){
        nextTemp[i]=clampT(Math.max(1200,T));
        for(let dy2=-4;dy2<=4;dy2++) for(let dx2=-4;dx2<=4;dx2++) if(inB(x+dx2,y+dy2)&&grid[idx(x+dx2,y+dy2)]!==EMPTY){
          const dist=Math.sqrt(dx2*dx2+dy2*dy2)||1,ni=idx(x+dx2,y+dy2),n=grid[ni];
          nextTemp[ni]=clampT(nextTemp[ni]+12/dist);
          if((n===EL.WOOD.id||n===EL.PLANT.id||n===EL.OIL.id||n===EL.GUNPOWDER.id||n===EL.NAPALM.id)&&dist<2&&Math.random()<.04)nextGrid[ni]=EL.FIRE.id;
          if(n===EL.ICE.id&&Math.random()<.1){nextGrid[ni]=EL.WATER.id;nextTemp[ni]=50;}
          if(n===EL.GLASS.id&&dist<2&&Math.random()<.02){nextGrid[ni]=EL.MOLTEN.id;nextTemp[ni]=900;}
        }
      }
      else if(el===EL.COOLER.id){
        nextTemp[i]=-80;
        for(let dy2=-4;dy2<=4;dy2++) for(let dx2=-4;dx2<=4;dx2++) if(inB(x+dx2,y+dy2)&&grid[idx(x+dx2,y+dy2)]!==EMPTY){
          const dist=Math.sqrt(dx2*dx2+dy2*dy2)||1,ni=idx(x+dx2,y+dy2),n=grid[ni];
          nextTemp[ni]=clampT(nextTemp[ni]-12/dist);
          if(n===EL.WATER.id&&dist<3&&Math.random()<.06){nextGrid[ni]=EL.ICE.id;nextTemp[ni]=-20;}
          if(n===EL.LAVA.id&&dist<2&&Math.random()<.04){nextGrid[ni]=EL.STONE.id;nextTemp[ni]=100;}
          if((n===EL.FIRE.id||n===EL.EMBER.id)&&dist<2&&Math.random()<.1)nextGrid[ni]=EMPTY;
          if(n===EL.STEAM.id&&dist<3&&Math.random()<.08){nextGrid[ni]=EL.WATER.id;nextTemp[ni]=10;}
          if(n===EL.BLOOD.id&&dist<3&&Math.random()<.04){nextGrid[ni]=EL.DRIED_BLOOD.id;}
        }
      }

      // ===== WALL — completely indestructible =====
      else if(el===EL.WALL.id){
        nextGrid[i]=EL.WALL.id; nextTemp[i]=20;
      }
      else if(el===EL.BLACKHOLE.id||el===EL.WHITEHOLE.id){
        nextGrid[i]=el; nextTemp[i]=T;
      }
      // ===== THERMITE — ignites with fire/spark/lava, burns at 2500°C, melts EVERYTHING =====
      else if(el===EL.THERMITE.id){
        if(gravDown&&canReplace(x,y+1,el))move(x,y,x,y+1);
        else if(canReplace(x-1,y+1,el))move(x,y,x-1,y+1);
        else if(canReplace(x+1,y+1,el))move(x,y,x+1,y+1);
        // Ignite from fire, spark, lava, ember
        for(const[dx,dy] of DIRS4){
          const n=get(x+dx,y+dy);
          if((n===EL.FIRE.id||n===EL.LAVA.id||n===EL.EMBER.id||n===EL.MAGMA.id)&&Math.random()<.05){
            nextGrid[i]=EL.THERMITE_B.id;nextTemp[i]=2500;continue;
          }
        }
        if(T>800&&Math.random()<.1){nextGrid[i]=EL.THERMITE_B.id;nextTemp[i]=2500;}
      }

      // ===== THERMITE BURN — ultra-hot liquid, melts stone/metal/glass/obsidian =====
      else if(el===EL.THERMITE_B.id){
        nextTemp[i]=clampT(Math.max(2200,T));
        heatAround(x,y,15,5);
        if(gravDown&&canReplace(x,y+1,el))move(x,y,x,y+1);
        else{const d=Math.random()>.5?1:-1;if(canReplace(x+d,y,el))move(x,y,x+d,y);else if(canReplace(x-d,y,el))move(x,y,x-d,y);}
        for(const[dx,dy] of DIRS4){
          const ni=idx(x+dx,y+dy),n=get(x+dx,y+dy);
          if(n===EL.WALL.id) continue; // wall immune
          // Thermite melts literally everything at 2500°C
          if(n===EL.STONE.id&&Math.random()<.15){nextGrid[ni]=EL.LAVA.id;nextTemp[ni]=1200;}
          if(n===EL.METAL.id&&Math.random()<.2){nextGrid[ni]=EL.MAGMA.id;nextTemp[ni]=1800;}
          if(n===EL.STAINLESS.id&&Math.random()<.2){nextGrid[ni]=EL.MAGMA.id;nextTemp[ni]=1800;}
          if(n===EL.TITANIUM.id&&Math.random()<.06){nextGrid[ni]=EL.MAGMA.id;nextTemp[ni]=1800;}
          if(n===EL.GLASS.id&&Math.random()<.2){nextGrid[ni]=EL.MOLTEN.id;nextTemp[ni]=1500;}
          if(n===EL.OBSIDIAN.id&&Math.random()<.1){nextGrid[ni]=EL.LAVA.id;nextTemp[ni]=1400;}
          if(n===EL.CONCRETE_H.id&&Math.random()<.08){nextGrid[ni]=EL.SAND.id;}
          if(n===EL.WATER.id&&Math.random()<.3){nextGrid[ni]=EL.STEAM.id;nextTemp[ni]=500;}
          if(n!==EMPTY&&n!==EL.THERMITE_B.id&&n!==EL.WALL.id) nextTemp[ni]=clampT(nextTemp[ni]+20);
        }
        // Slowly cools and turns to slag or magma
        nextTemp[i]=clampT(T-3);
        if(T<800&&Math.random()<.04){nextGrid[i]=Math.random()<.5?EL.SLAG.id:EL.MAGMA.id;}
      }

      // ===== FLASH POWDER — explodes instantly on ignition, massive white flash =====
      else if(el===EL.FLASHPOWDER.id){
        if(gravDown&&canReplace(x,y+1,el))move(x,y,x,y+1);
        else if(canReplace(x-1,y+1,el))move(x,y,x-1,y+1);
        else if(canReplace(x+1,y+1,el))move(x,y,x+1,y+1);
        // Much more sensitive than gunpowder — ignites at lower temp, bigger blast
        const triggered=(T>120)||Math.random()<.00003;
        for(const[dx,dy] of DIRS4){
          const n=get(x+dx,y+dy);
          if((n===EL.FIRE.id||n===EL.LAVA.id||n===EL.EMBER.id||n===EL.THERMITE_B.id)&&Math.random()<.2){
            // Massive instant explosion — bigger and faster than gunpowder
            for(let ey=-10;ey<=10;ey++) for(let ex=-10;ex<=10;ex++){
              if(ex*ex+ey*ey<=100&&inB(x+ex,y+ey)){
                const ei=idx(x+ex,y+ey),ge=grid[ei];
                if(ge!==EL.WALL.id){
                  nextGrid[ei]=EL.FIRE.id;nextTemp[ei]=clampT(nextTemp[ei]+1200);
                  // Blast velocity — scatter everything outward
                  velX[ei]+=(ex/(Math.sqrt(ex*ex+ey*ey)||1))*15;
                  velY[ei]+=(ey/(Math.sqrt(ex*ex+ey*ey)||1))*15;
                }
              }
            }
          }
        }
        if(triggered){
          for(let ey=-10;ey<=10;ey++) for(let ex=-10;ex<=10;ex++){
            if(ex*ex+ey*ey<=100&&inB(x+ex,y+ey)){
              const ei=idx(x+ex,y+ey);
              if(grid[ei]!==EL.WALL.id){nextGrid[ei]=EL.FIRE.id;nextTemp[ei]=clampT(nextTemp[ei]+1200);}
            }
          }
        }
      }

      // ===== POTASSIUM — explodes violently on contact with water, self-ignites =====
      else if(el===EL.POTASSIUM.id){
        for(const[dx,dy] of DIRS4){
          const ni=idx(x+dx,y+dy),n=get(x+dx,y+dy);
          if((n===EL.WATER.id||n===EL.STEAM.id||n===EL.SNOW.id||n===EL.ICE.id||n===EL.BLOOD.id||n===EL.MUD.id)&&Math.random()<.4){
            // Water + potassium = fire + hydrogen explosion, no ignition needed
            for(let ey=-5;ey<=5;ey++) for(let ex=-5;ex<=5;ex++){
              if(ex*ex+ey*ey<=25&&inB(x+ex,y+ey)){
                const ei=idx(x+ex,y+ey);
                if(grid[ei]!==EL.WALL.id){
                  nextGrid[ei]=EL.FIRE.id;nextTemp[ei]=clampT(nextTemp[ei]+700);
                  velX[ei]+=(ex/(Math.sqrt(ex*ex+ey*ey)||1))*10;
                  velY[ei]+=(ey/(Math.sqrt(ex*ex+ey*ey)||1))*10;
                }
              }
            }
            // Consume the water and the potassium
            nextGrid[i]=EL.SMOKE.id;nextTemp[i]=300;
            nextGrid[ni]=EL.STEAM.id;nextTemp[ni]=400;
          }
          // Also ignites from fire
          if((n===EL.FIRE.id||n===EL.LAVA.id)&&Math.random()<.1){
            for(let ey=-4;ey<=4;ey++) for(let ex=-4;ex<=4;ex++){
              if(ex*ex+ey*ey<=16&&inB(x+ex,y+ey)&&grid[idx(x+ex,y+ey)]!==EL.WALL.id){nextGrid[idx(x+ex,y+ey)]=EL.FIRE.id;nextTemp[idx(x+ex,y+ey)]=clampT(nextTemp[idx(x+ex,y+ey)]+500);}
            }
            nextGrid[i]=EL.SMOKE.id;nextTemp[i]=200;
          }
        }
      }

      // ===== MAGMA =====
      // REACTION 1: Lye + Oil = Soap (saponification)
      // REACTION 2: Lye + Water = heat burst (exothermic dissolving)
      // REACTION 3: Lye + Acid = neutralization (water + heat)
      // handled in LYE block below

      // ===== LYE — caustic powder, makes soap from oil, heats water =====
      else if(el===EL.LYE.id){
        if(gravDown&&canReplace(x,y+1,el))move(x,y,x,y+1);
        else if(canReplace(x-1,y+1,el))move(x,y,x-1,y+1);
        else if(canReplace(x+1,y+1,el))move(x,y,x+1,y+1);
        for(const[dx,dy] of DIRS4){
          const ni=idx(x+dx,y+dy),n=get(x+dx,y+dy);
          // REACTION 1: Lye + Oil = Soap (saponification — real soapmaking)
          if(n===EL.OIL.id&&Math.random()<.04){
            nextGrid[i]=EL.SOAP.id; nextGrid[ni]=EL.SOAP.id;
          }
          // REACTION 2: Lye + Water = exothermic heat burst (dissolving NaOH releases heat)
          if(n===EL.WATER.id&&Math.random()<.06){
            nextGrid[i]=EMPTY;
            nextTemp[ni]=clampT(nextTemp[ni]+80);
            heatAround(x,y,15,3);
          }
          // REACTION 3: Lye + Acid = neutralization (produces water, releases heat)
          if(n===EL.ACID.id&&Math.random()<.15){
            nextGrid[i]=EL.WATER.id; nextTemp[i]=clampT(T+60);
            nextGrid[ni]=EL.WATER.id; nextTemp[ni]=clampT(nextTemp[ni]+60);
          }
          // Lye slowly dissolves organics like a base
          if((n===EL.PLANT.id||n===EL.WOOD.id||n===EL.FUNGUS.id||n===EL.BLOOD.id)&&Math.random()<.005){
            nextGrid[ni]=EMPTY;
          }
        }
      }

      // ===== MERCURY — dense liquid metal, toxic gas when hot =====
      else if(el===EL.MERCURY.id){
        // REACTION 4: Mercury + Metal = amalgam (metal slowly absorbed, weakens it)
        // REACTION 5: Mercury heated > 350°C → toxic red mercury vapor (smoke)
        if(T>357&&Math.random()<.03){nextGrid[i]=EL.SMOKE.id;nextTemp[i]=400;continue;}
        if(gravDown&&canReplace(x,y+1,el))move(x,y,x,y+1);
        else{const d=Math.random()>.5?1:-1;
          if(canReplace(x+d,y,el))move(x,y,x+d,y);else if(canReplace(x-d,y,el))move(x,y,x-d,y);}
        for(const[dx,dy] of DIRS4){
          const ni=idx(x+dx,y+dy),n=get(x+dx,y+dy);
          // REACTION 4: Mercury dissolves metal into itself (amalgamation)
          if(n===EL.METAL.id&&Math.random()<.002){
            nextGrid[ni]=EL.MERCURY.id; nextTemp[ni]=T; // metal absorbed into mercury
          }
          // Mercury is immune to acid
          // Mercury + salt water = slight temp change, no reaction (realistic)
          // Freezes very cold
          if(T<-39&&Math.random()<.02){nextGrid[i]=EL.METAL.id;nextTemp[i]=T;} // mercury freezes to solid at -39°C
        }
      }

      // ===== SULFUR — yellow powder, burns blue, makes sulfuric acid with water =====
      else if(el===EL.SULFUR.id){
        if(gravDown&&canReplace(x,y+1,el))move(x,y,x,y+1);
        else if(canReplace(x-1,y+1,el))move(x,y,x-1,y+1);
        else if(canReplace(x+1,y+1,el))move(x,y,x+1,y+1);
        // Ignite from fire/lava/ember
        if((T>190||Math.random()<.00002)){
          for(const[dx,dy] of DIRS4){
            const n=get(x+dx,y+dy);
            if((n===EL.FIRE.id||n===EL.LAVA.id||n===EL.EMBER.id)&&Math.random()<.05){
              nextGrid[i]=EL.FIRE.id; nextTemp[i]=350; continue;
            }
          }
        }
        if(T>190&&Math.random()<.003){nextGrid[i]=EL.FIRE.id;nextTemp[i]=350;continue;}
        for(const[dx,dy] of DIRS4){
          const ni=idx(x+dx,y+dy),n=get(x+dx,y+dy);
          // REACTION 6: Sulfur + Water (when hot/burning) = sulfuric acid (SO2 + H2O → H2SO4)
          if(n===EL.WATER.id&&T>80&&Math.random()<.02){
            nextGrid[i]=EL.ACID.id; nextGrid[ni]=EL.ACID.id;
          }
          // REACTION 7: Sulfur + Charcoal + Saltpeter (gunpowder logic) — sulfur makes gunpowder burn hotter
          if(n===EL.GUNPOWDER.id&&T>100&&Math.random()<.02){
            // Sulfur-enhanced gunpowder: bigger explosion
            for(let ey=-8;ey<=8;ey++) for(let ex=-8;ex<=8;ex++){
              if(ex*ex+ey*ey<=64&&inB(x+ex,y+ey)&&grid[idx(x+ex,y+ey)]!==EL.WALL.id){
                nextGrid[idx(x+ex,y+ey)]=EL.FIRE.id;
                nextTemp[idx(x+ex,y+ey)]=clampT(nextTemp[idx(x+ex,y+ey)]+700);
              }
            }
          }
          // REACTION 8: Sulfur + Mercury = cinnabar (red crystal solid)
          if(n===EL.MERCURY.id&&Math.random()<.01){
            nextGrid[i]=EL.CRYSTAL.id; nextGrid[ni]=EL.CRYSTAL.id;
            // cinnabar is red
            extra[idx(x,y)]=1; extra[ni]=1; // flag for red crystal render
          }
        }
      }

      // ===== RUST — only spreads on metal; forms when metal touches water =====
      else if(el===EL.RUST.id){
        if(gravDown&&canReplace(x,y+1,el))move(x,y,x,y+1);
        else if(canReplace(x-1,y+1,el))move(x,y,x-1,y+1);
        else if(canReplace(x+1,y+1,el))move(x,y,x+1,y+1);
        for(const[dx,dy] of DIRS4){
          const ni=idx(x+dx,y+dy),n=get(x+dx,y+dy);
          // Rust spreads only onto adjacent metal when that metal is wet
          if(n===EL.METAL.id){
            let wet=false;
            for(const[d2x,d2y] of DIRS4) if(get(x+dx+d2x,y+dy+d2y)===EL.WATER.id||get(x+dx+d2x,y+dy+d2y)===EL.SALTWATER.id){wet=true;break;}
            if(wet&&Math.random()<.002) nextGrid[ni]=EL.RUST.id;
          }
          if(n===EL.ACID.id&&Math.random()<.05) nextGrid[i]=EMPTY;
        }
      }

      // ===== FOAM — fizzing expanding gas bubbles =====
      else if(el===EL.FOAM.id){
        if(Math.random()<.015){nextGrid[i]=EMPTY;continue;} // foam pops
        const nx2=x+Math.floor(Math.random()*3)-1;
        if(get(nx2,y-1)===EMPTY)move(x,y,nx2,y-1);
        else if(get(x,y-1)===EMPTY)move(x,y,x,y-1);
        else if(get(nx2,y)===EMPTY)move(x,y,nx2,y);
        // Foam smothers fire
        for(const[dx,dy] of DIRS4){
          const n=get(x+dx,y+dy);
          if((n===EL.FIRE.id||n===EL.EMBER.id)&&Math.random()<.2){nextGrid[idx(x+dx,y+dy)]=EMPTY;}
        }
      }

      // ===== CRYSTAL — grows, refracts, shatters =====
      else if(el===EL.CRYSTAL.id){
        // REACTION 9: Crystal + Saltwater = slow crystal growth (precipitation)
        for(const[dx,dy] of DIRS4){
          const ni=idx(x+dx,y+dy),n=get(x+dx,y+dy);
          if(n===EL.SALTWATER.id&&Math.random()<.002){
            nextGrid[ni]=EL.CRYSTAL.id; extra[ni]=extra[i]; // inherit color type
          }
          // Crystal shatters to glass shards from smash tool or explosions
          // High temp melts crystal to molten glass
          if(T>900&&Math.random()<.01){nextGrid[i]=EL.MOLTEN.id;nextTemp[i]=T;}
          // Acid slowly dissolves crystals
          if(n===EL.ACID.id&&Math.random()<.008){nextGrid[i]=EMPTY;}
        }
      }

      // ===== MAGMA =====
      else if(el===EL.MAGMA.id){
        nextTemp[i]=clampT(Math.max(T,800));heatAround(x,y,3,4);
        if(gravDown&&canReplace(x,y+1,el))move(x,y,x,y+1);
        else{const d=Math.random()>.5?1:-1;if(canReplace(x+d,y,el))move(x,y,x+d,y);else if(canReplace(x-d,y,el))move(x,y,x-d,y);}
        if(T<500&&Math.random()<.015){nextGrid[i]=EL.METAL.id;nextTemp[i]=T;continue;}
        for(const[dx,dy] of DIRS4){
          const ni=idx(x+dx,y+dy),n=get(x+dx,y+dy);
          if(n===EL.WATER.id&&Math.random()<.1){nextGrid[i]=EL.METAL.id;nextTemp[i]=300;nextGrid[ni]=EL.STEAM.id;nextTemp[ni]=200;}
          if((n===EL.WOOD.id||n===EL.OIL.id||n===EL.PLANT.id)&&Math.random()<.08)nextGrid[ni]=EL.FIRE.id;
          if(inB(x+dx,y+dy)&&n!==EMPTY)nextTemp[ni]=clampT(nextTemp[ni]+6);
        }
      }

      // ===== GAS =====
      else if(el===EL.FIRE.id){
        nextTemp[i]=clampT(Math.max(500,T));heatAround(x,y,10,3);
        if(T>2200&&Math.random()<.02){nextGrid[i]=EL.PLASMA.id;nextTemp[i]=T;continue;}
        if(Math.random()<.04){nextGrid[i]=Math.random()<.35?EL.ASH.id:EMPTY;continue;}
        if(Math.random()<.3){const nx2=x+(Math.random()>.5?1:-1);if(get(nx2,y-1)===EMPTY)move(x,y,nx2,y-1);else if(get(x,y-1)===EMPTY)move(x,y,x,y-1);}
        if(Math.random()<.08&&get(x,y-1)===EMPTY){nextGrid[idx(x,y-1)]=EL.SMOKE.id;nextTemp[idx(x,y-1)]=100;}
        if(Math.random()<.02) for(const[dx,dy] of [[0,-1],[1,-1],[-1,-1]]) if(inB(x+dx,y+dy)&&get(x+dx,y+dy)===EMPTY){nextGrid[idx(x+dx,y+dy)]=EL.CO2.id;nextTemp[idx(x+dx,y+dy)]=40;break;}
        for(const[dx,dy] of DIRS4){
          const ni=idx(x+dx,y+dy),n=get(x+dx,y+dy);
          if(n===EL.WOOD.id&&Math.random()<.012){nextGrid[ni]=EL.CHARCOAL.id;nextTemp[ni]=350;}
          if(n===EL.COAL.id&&Math.random()<.006){nextGrid[ni]=EL.FIRE.id;nextTemp[ni]=500;}
          if(n===EL.TAR.id&&Math.random()<.05)nextGrid[ni]=EL.FIRE.id;
          if(n===EL.NAPALM.id&&Math.random()<.08){nextGrid[ni]=EL.FIRE.id;nextTemp[ni]=650;}
          if(n===EL.PLANT.id&&Math.random()<.025)nextGrid[ni]=EL.FIRE.id;
          if(n===EL.OIL.id&&Math.random()<.04){nextGrid[ni]=Math.random()<.25?EL.SOOT.id:EL.FIRE.id;if(nextGrid[ni]===EL.SOOT.id)nextTemp[ni]=80;}
          if(n===EL.HONEY.id&&Math.random()<.02)nextGrid[ni]=EL.FIRE.id;
          if(n>=94&&n<=134&&EID[n]&&Math.random()<.025){nextGrid[ni]=EL.FIRE.id;nextTemp[ni]=400;}
          if(n===EL.CHARCOAL.id&&Math.random()<.006){nextGrid[ni]=EL.FIRE.id;nextTemp[ni]=400;}
          if(n===EL.FUNGUS.id&&Math.random()<.03)nextGrid[ni]=EL.FIRE.id;
          if(n===EL.BLOOD.id&&Math.random()<.04){nextGrid[ni]=EL.STEAM.id;nextTemp[ni]=120;}
          if(n===EL.GLUE.id&&Math.random()<.03)nextGrid[ni]=EL.SMOKE.id;
          if(n===EL.SLIME.id&&Math.random()<.02)nextGrid[ni]=EL.FIRE.id;
          // Methane explosion
          if(n===EL.METHANE.id&&Math.random()<.1){
            for(let ey=-8;ey<=8;ey++) for(let ex=-8;ex<=8;ex++) if(ex*ex+ey*ey<=64&&inB(x+dx+ex,y+dy+ey)){
              const ei=idx(x+dx+ex,y+dy+ey);
              if(grid[ei]!==EL.STONE.id&&grid[ei]!==EL.OBSIDIAN.id&&grid[ei]!==EL.CONCRETE_H.id){nextGrid[ei]=EL.FIRE.id;nextTemp[ei]=clampT(nextTemp[ei]+900);}
            }
          }
          if(n===EL.GUNPOWDER.id&&Math.random()<.1){
            for(let ey=-6;ey<=6;ey++) for(let ex=-6;ex<=6;ex++) if(ex*ex+ey*ey<=36&&inB(x+dx+ex,y+dy+ey)){
              const ei=idx(x+dx+ex,y+dy+ey);if(grid[ei]!==EL.STONE.id&&grid[ei]!==EL.CONCRETE_H.id){nextGrid[ei]=EL.FIRE.id;nextTemp[ei]=clampT(nextTemp[ei]+600);}
            }
          }
          if(n===EL.GLASS.id&&Math.random()<.01){nextGrid[ni]=EL.MOLTEN.id;nextTemp[ni]=800;}
          if(n===EL.WATER.id&&Math.random()<.08)nextGrid[i]=EMPTY;
          // Fire + nitrogen = quenched
          if(n===EL.NITROGEN.id&&Math.random()<.35){nextGrid[i]=EMPTY;nextGrid[ni]=EMPTY;}
          // Fire lights CO2 super easily (CO2 ignites)
          if(n===EL.CO2.id&&Math.random()<.98){nextGrid[ni]=EL.FIRE.id;nextTemp[ni]=clampT(nextTemp[ni]+450);}
          if(inB(x+dx,y+dy)&&n!==EMPTY)nextTemp[ni]=clampT(nextTemp[ni]+6);
        }
      }

      else if(el===EL.SMOKE.id){
        if(Math.random()<.006){nextGrid[i]=T<60&&Math.random()<.4?EL.SOOT.id:EMPTY;continue;}
        const nx2=x+Math.floor(Math.random()*3)-1;
        if(get(nx2,y-1)===EMPTY)move(x,y,nx2,y-1);else if(get(x,y-1)===EMPTY)move(x,y,x,y-1);else if(get(nx2,y)===EMPTY)move(x,y,nx2,y);
      }
      else if(el===EL.STEAM.id){
        if(T>2500&&Math.random()<.015){nextGrid[i]=EL.PLASMA.id;nextTemp[i]=T;continue;}
        const cond=T<55?.025:T<75?.004:0;
        if(Math.random()<cond){nextGrid[i]=EL.WATER.id;nextTemp[i]=50;continue;}
        if(Math.random()<.004){nextGrid[i]=EMPTY;continue;}
        const nx2=x+Math.floor(Math.random()*3)-1;
        if(get(nx2,y-1)===EMPTY)move(x,y,nx2,y-1);else if(get(x,y-1)===EMPTY)move(x,y,x,y-1);else if(get(nx2,y)===EMPTY)move(x,y,nx2,y);
        if(y<H/4&&T<40&&Math.random()<.005)nextGrid[i]=EL.CLOUD.id;
      }
      else if(el===EL.CLOUD.id){
        const dx=Math.floor(Math.random()*3)-1;
        if(get(x+dx,y)===EMPTY)move(x,y,x+dx,y);else if(get(x+dx,y-1)===EMPTY)move(x,y,x+dx,y-1);else if(get(x+dx,y+1)===EMPTY)move(x,y,x+dx,y+1);
        if(Math.random()<.004&&get(x,y+1)===EMPTY){nextGrid[idx(x,y+1)]=Math.random()<.5?EL.RAIN.id:EL.WATER.id;nextTemp[idx(x,y+1)]=15;}
      }
      else if(el===EL.PLASMA.id){
        nextTemp[i]=clampT(Math.max(3000,T));
        heatAround(x,y,180,4); // strong heat transfer so ice/water etc actually react
        for(const[dx,dy] of DIRS4){
          const ni=idx(x+dx,y+dy),n=get(x+dx,y+dy);
          if(n===EL.ICE.id&&Math.random()<.6){nextGrid[ni]=EL.STEAM.id;nextTemp[ni]=200;}
          else if(n===EL.SNOW.id&&Math.random()<.5){nextGrid[ni]=EL.WATER.id;nextTemp[ni]=80;}
          else if(n===EL.WATER.id&&Math.random()<.4){nextGrid[ni]=EL.STEAM.id;nextTemp[ni]=150;}
          else if(n===EL.HAIL.id&&Math.random()<.5){nextGrid[ni]=EL.WATER.id;nextTemp[ni]=60;}
          else if(n!==EMPTY&&n!==EL.WALL.id)nextTemp[ni]=clampT(nextTemp[ni]+80);
        }
        if(T<1500&&Math.random()<.03){nextGrid[i]=EL.FIRE.id;nextTemp[i]=600;continue;}
        const nx2=x+(Math.random()>.5?1:-1);
        if(get(nx2,y-1)===EMPTY)move(x,y,nx2,y-1);else if(get(x,y-1)===EMPTY)move(x,y,x,y-1);else if(get(nx2,y)===EMPTY)move(x,y,nx2,y);
      }
      else if(el===EL.TORNADO.id){
        const tdx=Math.floor(Math.random()*3)-1,tdy=Math.random()<.15?-1:0;
        if(get(x+tdx,y+tdy)===EMPTY)move(x,y,x+tdx,y+tdy);else if(get(x,y-1)===EMPTY)move(x,y,x,y-1);else if(get(x+tdx,y)===EMPTY)move(x,y,x+tdx,y);
        for(let dy2=-8;dy2<=8;dy2++) for(let dx2=-8;dx2<=8;dx2++){
          const dist=Math.sqrt(dx2*dx2+dy2*dy2);if(dist<1||dist>8||!inB(x+dx2,y+dy2))continue;
          const ni=idx(x+dx2,y+dy2),n=grid[ni];if(n===EMPTY||n===EL.TORNADO.id)continue;
          const nE=EID[n];if(!nE||nE.type==='solid')continue;
          const str=3/dist;velX[ni]+=-dy2*str+dx2*.8;velY[ni]+=dx2*str+dy2*.8;
        }
        if(Math.random()<.002)nextGrid[i]=EMPTY;
      }
      else if(el===EL.NITROGEN.id){
        nextTemp[i]=-196;
        const nx2=x+Math.floor(Math.random()*3)-1;
        if(get(nx2,y-1)===EMPTY)move(x,y,nx2,y-1);else if(get(x,y-1)===EMPTY)move(x,y,x,y-1);else if(get(nx2,y)===EMPTY)move(x,y,nx2,y);
        if(Math.random()<.005){nextGrid[i]=EMPTY;continue;}
        for(const[dx,dy] of DIRS4){
          if(!inB(x+dx,y+dy))continue;const ni=idx(x+dx,y+dy),n=grid[ni];
          nextTemp[ni]=clampT(nextTemp[ni]-45);
          if(n===EL.WATER.id&&Math.random()<.35){nextGrid[ni]=EL.ICE.id;nextTemp[ni]=-100;}
          if(n===EL.FIRE.id&&Math.random()<.85)nextGrid[ni]=EMPTY;
          if(n===EL.LAVA.id&&Math.random()<.25){nextGrid[ni]=EL.OBSIDIAN.id;nextTemp[ni]=0;}
          if(n===EL.STEAM.id&&Math.random()<.5){nextGrid[ni]=EL.WATER.id;nextTemp[ni]=-5;}
          if(n===EL.BLOOD.id&&Math.random()<.2)nextGrid[ni]=EL.DRIED_BLOOD.id;
          if(n===EL.NAPALM.id&&Math.random()<.1){nextGrid[ni]=EL.TAR.id;nextTemp[ni]=-50;} // nitrogen freezes napalm into tar-like solid
        }
      }
      else if(el===EL.METHANE.id){
        const nx2=x+Math.floor(Math.random()*3)-1;
        if(get(nx2,y-1)===EMPTY)move(x,y,nx2,y-1);else if(get(x,y-1)===EMPTY)move(x,y,x,y-1);else if(get(nx2,y)===EMPTY)move(x,y,nx2,y);
        if(Math.random()<.003){nextGrid[i]=EMPTY;continue;}
        if(T>400&&Math.random()<.05){
          for(let ey=-8;ey<=8;ey++) for(let ex=-8;ex<=8;ex++) if(ex*ex+ey*ey<=64&&inB(x+ex,y+ey)){
            const ei=idx(x+ex,y+ey);if(grid[ei]!==EL.STONE.id&&grid[ei]!==EL.OBSIDIAN.id&&grid[ei]!==EL.CONCRETE_H.id){nextGrid[ei]=EL.FIRE.id;nextTemp[ei]=clampT(nextTemp[ei]+900);}
          }
        }
      }
      else if(el===EL.CHLORINE.id){
        const nx2=x+Math.floor(Math.random()*3)-1;
        if(get(nx2,y-1)===EMPTY)move(x,y,nx2,y-1);else if(get(x,y-1)===EMPTY)move(x,y,x,y-1);else if(get(nx2,y)===EMPTY)move(x,y,nx2,y);
        if(Math.random()<.008){nextGrid[i]=EMPTY;continue;}
        for(const[dx,dy] of DIRS4){
          const ni=idx(x+dx,y+dy),n=get(x+dx,y+dy);
          if(n===EL.WATER.id&&Math.random()<.15){nextGrid[ni]=EL.BLEACH.id;nextTemp[ni]=T;}
          if((n===EL.PLANT.id||n===EL.WOOD.id||n===EL.FUNGUS.id)&&Math.random()<.02)nextGrid[ni]=EMPTY;
        }
      }
      else if(el===EL.HYDROGEN.id){
        const nx2=x+Math.floor(Math.random()*3)-1;
        if(get(nx2,y-1)===EMPTY)move(x,y,nx2,y-1);else if(get(x,y-1)===EMPTY)move(x,y,x,y-1);else if(get(nx2,y)===EMPTY)move(x,y,nx2,y);
        if(Math.random()<.005){nextGrid[i]=EMPTY;continue;}
        for(const[dx,dy] of DIRS4){
          const n=get(x+dx,y+dy);
          if((n===EL.FIRE.id||n===EL.EMBER.id||n===EL.LAVA.id)&&Math.random()<.5){
            for(let ey=-6;ey<=6;ey++) for(let ex=-6;ex<=6;ex++) if(ex*ex+ey*ey<=36&&inB(x+ex,y+ey)&&grid[idx(x+ex,y+ey)]!==EL.WALL.id){nextGrid[idx(x+ex,y+ey)]=EL.FIRE.id;nextTemp[idx(x+ex,y+ey)]=clampT(nextTemp[idx(x+ex,y+ey)]+600);}
            nextGrid[i]=EMPTY;
          }
        }
      }
      else if(el===EL.OZONE.id){
        const nx2=x+Math.floor(Math.random()*3)-1;
        if(get(nx2,y-1)===EMPTY)move(x,y,nx2,y-1);else if(get(x,y-1)===EMPTY)move(x,y,x,y-1);else if(get(nx2,y)===EMPTY)move(x,y,nx2,y);
        if(Math.random()<.01){nextGrid[i]=EMPTY;continue;}
        for(const[dx,dy] of DIRS4){
          const ni=idx(x+dx,y+dy),n=get(x+dx,y+dy);
          if((n===EL.PLANT.id||n===EL.WOOD.id||n===EL.FUNGUS.id||n===EL.VIRUS.id)&&Math.random()<.015)nextGrid[ni]=EMPTY;
        }
      }
      else if(el===EL.CO2.id){
        for(const[dx,dy] of DIRS4){ if(get(x+dx,y+dy)===EL.FIRE.id&&Math.random()<.98){ nextGrid[i]=EL.FIRE.id; nextTemp[i]=clampT(nextTemp[i]+450); continue; } }
        if(extra[i]>=200){
          extra[i]=Math.min(255,extra[i]+1);
          nextTemp[i]=clampT(nextTemp[i]+12);
          if(extra[i]>=225){ nextGrid[i]=EL.FIRE.id; nextTemp[i]=Math.max(420,nextTemp[i]); extra[i]=0; continue; }
        }
        for(const[dx,dy] of DIRS4){ const n=get(x+dx,y+dy),ni=idx(x+dx,y+dy); if(n===EL.WATER.id&&Math.random()<.1){nextGrid[i]=EL.FOAM.id;nextGrid[ni]=EL.FOAM.id;} }
        const nx2=x+Math.floor(Math.random()*3)-1;
        if(get(nx2,y+1)===EMPTY)move(x,y,nx2,y+1);else if(get(x,y+1)===EMPTY)move(x,y,x,y+1);else if(get(nx2,y)===EMPTY)move(x,y,nx2,y);
        if(Math.random()<.004){nextGrid[i]=EMPTY;continue;}
      }
    }
  }

  grid.set(nextGrid);temp.set(nextTemp);elec.set(nextElec);
  for(let i=0;i<W*H;i++){velX[i]*=0.88;velY[i]*=0.88;}
}

// ====== RENDER ======
function lerp(a,b,t){return a+(b-a)*t;}
function tempColor(r,g,b,T){
  if(T>300){const h=Math.min(1,(T-300)/700);r=Math.min(255,r+h*80);g=Math.max(0,g-h*30);b=Math.max(0,b-h*50);}
  if(T<0){const c=Math.min(1,(-T)/80);r=Math.max(0,r-c*40);g=Math.max(0,g-c*10);b=Math.min(255,b+c*70);}
  return[r,g,b];
}
function heatmapRGB(T){
  if(T<=-100)return[0,0,Math.round(lerp(0,200,(T+200)/100))];
  if(T<=0)return[0,Math.round(lerp(0,255,(T+100)/100)),255];
  if(T<=100)return[0,255,Math.round(lerp(255,0,T/100))];
  if(T<=400)return[Math.round(lerp(0,255,(T-100)/300)),255,0];
  return[255,Math.round(Math.max(0,lerp(255,0,(T-400)/400))),0];
}

function render(){
  const lowFx=fpsBoostOn;
  const br=brushSlider?Math.max(1,parseInt(brushSlider.value,10)||3):3;
  // Line tool preview: which cells will be drawn when second click happens
  linePreviewCells.clear();
  if(!lowFx&&toolMode==='line'&&lineStart&&inB(hX,hY)){
    const x0=lineStart[0],y0=lineStart[1],x1=hX,y1=hY;
    const steps=Math.max(Math.abs(x1-x0),Math.abs(y1-y0),1);
    for(let s=0;s<=steps;s++){
      const gx=Math.round(x0+(x1-x0)*s/steps),gy=Math.round(y0+(y1-y0)*s/steps);
      if(inB(gx,gy)) linePreviewCells.add(idx(gx,gy));
    }
  }
  if(gravityFieldOn&&!lowFx){
    gravFieldBH.length=0;gravFieldWH.length=0;
    for(let y=0;y<H;y++) for(let x=0;x<W;x++){
      const el=grid[idx(x,y)];
      if(el===EL.BLACKHOLE.id) gravFieldBH.push([x,y]);
      else if(el===EL.WHITEHOLE.id) gravFieldWH.push([x,y]);
    }
  }
  for(let y=0;y<H;y++) for(let x=0;x<W;x++){
    const i=idx(x,y),el=grid[i],T=temp[i];
    let r=10,g=10,b=15;
    if(el!==EMPTY){
      if(heatmapOn&&!lowFx){[r,g,b]=heatmapRGB(T);}
      else{
        const e=EID[el];
        if(e){
          [r,g,b]=[...e.col];
          if(lowFx){
            [r,g,b]=tempColor(r,g,b,T);
          } else {
            const j=(Math.random()-.5);
            if(el===EL.FIRE.id||el===EL.EMBER.id){r=Math.min(255,r+j*45);g=Math.min(255,Math.max(0,g+j*15));}
          else if(el===EL.LAVA.id){r=Math.min(255,r+j*40);g=Math.min(255,Math.max(0,g+j*20));[r,g,b]=tempColor(r,g,b,T);}
          else if(el===EL.METAL.id||el===EL.STAINLESS.id||el===EL.TITANIUM.id){const ch=elec[i];if(ch>0){const gl=ch/8;r=Math.min(255,r+gl*180);g=Math.min(255,g+gl*180);b=Math.min(255,b+gl*255);if(Math.random()<gl*.7){r=255;g=255;b=255;}}else[r,g,b]=tempColor(r,g,b,T);}
          else if(el===EL.MAGMA.id){r=Math.min(255,r+Math.abs(j)*40);g=Math.min(255,Math.max(0,g+j*20));[r,g,b]=tempColor(r,g,b,T);}
          else if(el===EL.HEATER.id){r=Math.min(255,r+Math.abs(j)*60);g=Math.min(255,Math.max(0,g+j*15));}
          else if(el===EL.COOLER.id){b=Math.min(255,b+Math.abs(j*50));r=Math.max(0,r-Math.abs(j*50)*.3);}
          else if(el===EL.MOLTEN.id){r=Math.min(255,r+j*35);g=Math.min(255,Math.max(0,g+j*25));}
          else if(el===EL.WATER.id){r=Math.max(0,r+j*10);g=Math.max(0,g+j*10);b=Math.min(255,b+j*10);[r,g,b]=tempColor(r,g,b,T);}
          else if(el===EL.HONEY.id){r=Math.min(255,r+j*20);g=Math.min(255,Math.max(0,g+j*10));[r,g,b]=tempColor(r,g,b,T);}
          else if(el===EL.MELT_WAX.id){r=Math.min(255,r+j*15);g=Math.min(255,g+j*12);b=Math.min(255,b+j*10);}
          else if(el===EL.MOLTEN_SAND.id){r=Math.min(255,255+j*40);g=Math.min(255,Math.max(0,160+j*40));b=20;}
          else if(el===EL.MOLTEN_DIRT.id){r=Math.min(255,180+Math.abs(j*35));g=Math.max(0,80+j*20);b=15;}
          else if(el===EL.MOLTEN_MUD.id){r=Math.min(255,140+Math.abs(j*30));g=Math.max(0,65+j*15);b=15;}
          else if(el===EL.CHARCOAL.id){const glow=Math.max(0,(T-200)/400);r=Math.min(255,45+glow*180);g=Math.min(255,42+glow*60);b=Math.min(255,40+glow*20);}
          else if(el===EL.DIRT.id){r=Math.min(255,r+j*12);g=Math.min(255,g+j*10);b=Math.max(0,b+j*5);}
          else if(el===EL.COAL.id){const glow=Math.max(0,(T-300)/500);r=Math.min(255,30+glow*200);g=Math.min(255,28+glow*70);b=Math.min(255,26+glow*20);}
          else if(el===EL.SNOW.id){r=Math.min(255,r+j*18);g=Math.min(255,g+j*18);b=Math.min(255,b+j*9);}
          else if(el===EL.BLEACH.id){r=Math.min(255,r+j*15);g=Math.min(255,g+j*15);b=255;}
          else if(el===EL.OBSIDIAN.id){r=Math.max(0,30+j*8);g=Math.max(0,20+j*8);b=Math.max(0,35+j*8);if(Math.random()<.03){r=50;g=30;b=70;}}
          else if(el===EL.QUICKSAND.id){r=Math.min(255,r+j*20);g=Math.min(255,g+j*18);b=Math.max(0,b+j*8);if(Math.random()<.07){r=Math.min(255,r+20);g=Math.min(255,g+15);}}
          else if(el===EL.SPORE.id){const fl=Math.random()>.6?15:0;r=140+fl;g=Math.min(255,190+fl);b=60+fl;}
          else if(el===EL.VIRUS.id){const fl=Math.random()>.5?20:0;r=Math.max(0,80-fl);g=Math.min(255,220+fl);b=Math.max(0,80-fl);}
          else if(el===EL.TORNADO.id){r=Math.min(255,150+j*60);g=Math.min(255,158+j*60);b=Math.min(255,175+j*60);if(Math.random()<.3){r=200;g=210;b=230;}}
          else if(el===EL.SOAP.id){const ph=Math.random();if(ph<.33){r=210;g=230;b=255;}else if(ph<.66){r=220;g=255;b=230;}else{r=255;g=220;b=240;}}
          else if(el===EL.TAR.id){r=Math.max(0,25+j*10);g=Math.max(0,20+j*10);b=Math.max(0,18+j*8);if(Math.random()<.05){r=40;g=35;b=32;}[r,g,b]=tempColor(r,g,b,T);}
          else if(el===EL.NAPALM.id){const fl=T>60?Math.random()*35:0;r=Math.min(255,200+fl);g=Math.max(0,70-fl*.5);b=10;}
          else if(el===EL.NITROGEN.id){r=Math.max(0,190+j*40);g=Math.min(255,225+j*40);b=255;if(Math.random()<.3){r=220;g=240;b=255;}}
          else if(el===EL.METHANE.id){r=10+Math.random()*12;g=20+Math.random()*18;b=15+Math.random()*12;}
          else if(el===EL.FUNGUS.id){r=Math.min(255,130+j*20);g=Math.min(255,105+j*10);b=Math.max(0,55+j*15);if(Math.random()<.05){r=110;g=145;b=45;}}
          else if(el===EL.GLASSHARD.id){r=Math.min(255,200+j*30);g=Math.min(255,235+j*15);b=Math.min(255,245+j*10);if(Math.random()<.15){r=255;g=255;b=255;}}
          else if(el===EL.CONCRETE.id){const age=extra[i]/255;r=Math.round(lerp(165,142,age));g=Math.round(lerp(160,138,age));b=Math.round(lerp(152,134,age));}
          else if(el===EL.CONCRETE_H.id){r=Math.max(0,140+j*8);g=Math.max(0,137+j*8);b=Math.max(0,133+j*8);}
          else if(el===EL.SLIME.id){r=Math.max(0,60+j*25);g=Math.min(255,200+j*25);b=Math.max(0,80+j*20);if(Math.random()<.08){r=80;g=230;b=100;}}
          else if(el===EL.GLUE.id){const jj=j*20;r=Math.min(255,255+jj);g=Math.min(255,245+jj);b=Math.max(0,185+jj*.5);}
          else if(el===EL.MAGNET.id){r=Math.min(255,185+j*20);g=Math.max(0,30+j*5);b=Math.max(0,30+j*5);if(Math.random()<.1){r=220;g=50;b=50;}}
          else if(el===EL.BLACKHOLE.id){r=Math.max(0,20+j*8);g=Math.max(0,5+j*4);b=Math.min(255,30+j*12);if(Math.random()<.2){r=60;g=0;b=80;}}
          else if(el===EL.WHITEHOLE.id){r=Math.min(255,240+j*15);g=Math.min(255,248+j*7);b=255;}
          else if(el===EL.BLOOD.id){const age=extra[i]/255;r=Math.round(lerp(210,150,age));g=Math.max(0,Math.round(20-age*15));b=Math.max(0,Math.round(20-age*10));}
          else if(el===EL.DRIED_BLOOD.id){r=Math.max(0,100+j*8);g=Math.max(0,10+j*3);b=Math.max(0,10+j*3);}
          else if(el===EL.GEL.id){
            // Dry gel = pale teal, full gel = deep swollen blue-green
            const full=extra[i]>=255;
            if(full){r=40;g=180;b=220;if(Math.random()<.12){r=60;g=210;b=255;}} // swollen, wet-looking
            else{r=Math.round(100+Math.random()*10);g=Math.round(210+Math.random()*15);b=Math.round(190+Math.random()*15);}
          }
          else if(el===EL.SALTWATER.id){
            // Slightly greener/murkier than regular water
            const j=(Math.random()-.5)*12;
            r=Math.max(0,35+j);g=Math.min(255,115+j);b=Math.min(255,195+j);
            [r,g,b]=tempColor(r,g,b,T);
          }
          else if(el===EL.WALL.id){
            // Dark grey bricks with subtle grid pattern
            const bx=Math.floor(x/4),by=Math.floor(y/4);
            const isEdge=(x%4===0||y%4===0);
            r=isEdge?40:62; g=isEdge?41:64; b=isEdge?44:70;
          }
          else if(el===EL.THERMITE.id){
            const j=(Math.random()-.5)*20;r=Math.min(255,180+j);g=Math.max(0,80+j*.5);b=Math.max(0,20+j*.2);
            if(Math.random()<.05){r=200;g=100;b=30;} // iron oxide sparkle
          }
          else if(el===EL.THERMITE_B.id){
            // Blinding white-yellow at peak temp
            const fl=Math.random()*60;
            r=255;g=Math.min(255,230+fl*.3);b=Math.min(255,100+fl);
            if(Math.random()<.4){r=255;g=255;b=200+Math.random()*55;} // white hot flash
          }
          else if(el===EL.FLASHPOWDER.id){
            const j=(Math.random()-.5)*25;
            r=Math.min(255,220+j);g=Math.min(255,215+j);b=Math.min(255,200+j);
            if(Math.random()<.08){r=255;g=255;b=255;} // shimmer
          }
          else if(el===EL.POTASSIUM.id){
            const j=(Math.random()-.5)*15;
            r=Math.min(255,200+j);g=Math.min(255,190+j);b=Math.min(255,220+j);
            if(Math.random()<.06){r=220;g=210;b=240;}
          }
          else if(el===EL.LYE.id){
            // Chalky white-cream powder
            const j=(Math.random()-.5)*18;
            r=Math.min(255,220+j);g=Math.min(255,210+j);b=Math.min(255,180+j);
            if(Math.random()<.06){r=235;g=228;b=200;}
          }
          else if(el===EL.MERCURY.id){
            // Liquid mirror — highly reflective silver with sharp specular
            const j=(Math.random()-.5)*12;
            r=Math.min(255,200+j);g=Math.min(255,205+j);b=Math.min(255,215+j);
            if(Math.random()<.2){r=235;g=238;b=245;} // bright specular flash
            if(Math.random()<.05){r=170;g=175;b=185;} // shadow
          }
          else if(el===EL.SULFUR.id){
            // Bright yellow, glows orange when burning
            const burning=T>190;
            if(burning){
              const fl=Math.random()*40;
              r=Math.min(255,255);g=Math.max(0,100-fl);b=Math.max(0,0);
            } else {
              const j=(Math.random()-.5)*20;
              r=Math.min(255,210+j);g=Math.min(255,195+j);b=Math.max(0,40+j*.3);
              if(Math.random()<.08){r=225;g=210;b=50;} // bright sulphur yellow
            }
          }
          else if(el===EL.RUST.id){
            // Orange-brown flaky powder
            const j=(Math.random()-.5)*25;
            r=Math.min(255,160+j);g=Math.max(0,70+j*.4);b=Math.max(0,30+j*.2);
            if(Math.random()<.1){r=190;g=90;b=40;}
          }
          else if(el===EL.FOAM.id){
            // Fizzy white bubbles with slight transparency feel
            const j=(Math.random()-.5)*30;
            r=Math.min(255,240+j);g=Math.min(255,245+j);b=Math.min(255,255+j*.3);
            if(Math.random()<.3){r=255;g=255;b=255;} // bright bubble pop
            if(Math.random()<.1){r=200;g=220;b=240;} // slight blue tint
          }
          else if(el===EL.CRYSTAL.id){
            // Color depends on type: extra=0 = blue-white, extra=1 = red cinnabar
            const isCinnabar=extra[i]===1;
            if(isCinnabar){
              const j=(Math.random()-.5)*20;
              r=Math.min(255,200+j);g=Math.max(0,40+j*.3);b=Math.max(0,30+j*.2);
              if(Math.random()<.15){r=230;g=60;b=50;} // deep cinnabar red glint
            } else {
              const j=(Math.random()-.5)*25;
              r=Math.min(255,180+j);g=Math.min(255,230+j);b=255;
              if(Math.random()<.2){r=220;g=245;b=255;} // ice-blue sparkle
              if(Math.random()<.05){r=255;g=255;b=255;} // white specular
            }
          }
          else if(el===EL.ASH.id){const j=(Math.random()-.5)*12;r=Math.min(255,90+j);g=Math.min(255,88+j);b=Math.min(255,85+j);}
          else if(el===EL.SOOT.id){r=Math.max(0,35+Math.random()*15);g=Math.max(0,33+Math.random()*12);b=Math.max(0,32+Math.random()*12);}
          else if(el===EL.CHLORINE.id){r=Math.min(255,180+Math.random()*30);g=255;b=Math.min(255,180+Math.random()*30);if(Math.random()<.2){r=200;g=255;b=200;}}
          else if(el===EL.HYDROGEN.id){r=Math.min(255,220+Math.random()*25);g=Math.min(255,240+Math.random()*15);b=255;}
          else if(el===EL.OZONE.id){r=Math.min(255,200+Math.random()*25);g=Math.min(255,220+Math.random()*25);b=255;}
          else if(el===EL.CO2.id){r=Math.max(0,140+Math.random()*20);g=Math.min(255,155+Math.random()*20);b=Math.min(255,165+Math.random()*20);}
          else if(el===EL.SAP.id){const j=(Math.random()-.5)*20;r=Math.min(255,180+j);g=Math.min(255,140+j);b=Math.max(0,60+j);}
          else if(el===EL.SLAG.id){const j=(Math.random()-.5)*8;r=Math.max(0,70+j);g=Math.max(0,68+j);b=Math.max(0,72+j);}
          else if(el===EL.PUMICE.id){const j=(Math.random()-.5)*15;r=Math.min(255,170+j);g=Math.min(255,165+j);b=Math.min(255,155+j);}
          else if(el===EL.MILDEW.id){const j=(Math.random()-.5)*15;r=Math.min(255,100+j);g=Math.min(255,120+j);b=Math.max(0,70+j);}
          else if(el===EL.GOLD.id){const j=(Math.random()-.5)*25;r=Math.min(255,255+j);g=Math.min(255,215+j);b=Math.max(0,0+j);if(Math.random()<.08){r=255;g=230;b=80;}}
          else if(el===EL.RAIN.id){r=Math.min(255,100+j*15);g=Math.min(255,160+j*15);b=255;[r,g,b]=tempColor(r,g,b,T);}
          else if(el===EL.PLASMA.id){const glow=0.7+Math.random()*0.3;r=Math.min(255,200+glow*55);g=Math.min(255,100+glow*80);b=255;if(Math.random()<.4){r=255;g=180;b=255;}}
          else if(el===EL.HAIL.id){const j=(Math.random()-.5)*18;r=Math.min(255,220+j);g=Math.min(255,235+j);b=255;}
          else if(el===EL.MOLTEN_GOLD.id){const j=(Math.random()-.5)*30;r=255;g=Math.min(255,200+j);b=Math.max(0,50+j);if(Math.random()<.2){r=255;g=255;b=150;}}
          else if(el===EL.ANTIDOTE.id){r=Math.min(255,200+j*20);g=255;b=Math.min(255,220+j*20);}
          else if(el===EL.BONE.id){const j=(Math.random()-.5)*15;r=Math.min(255,230+j);g=Math.min(255,220+j);b=Math.min(255,200+j);}
          else if(el===EL.SUGAR.id){const j=(Math.random()-.5)*18;r=Math.min(255,255+j);g=Math.min(255,250+j);b=Math.min(255,240+j);}
          else if(el===EL.SUGARWATER.id){const j=(Math.random()-.5)*12;r=Math.min(255,240+j);g=Math.min(255,230+j);b=Math.min(255,210+j);[r,g,b]=tempColor(r,g,b,T);}
          else if(el===EL.SEED.id){const j=(Math.random()-.5)*18;r=Math.min(255,139+j);g=Math.min(255,100+j);b=Math.min(255,50+j);[r,g,b]=tempColor(r,g,b,T);}
          else if(el>=94&&el<=134&&EID[el]){const j=(Math.random()-.5)*18;const c=EID[el].col;r=Math.min(255,c[0]+j);g=Math.min(255,c[1]+j);b=Math.min(255,c[2]+j);[r,g,b]=tempColor(r,g,b,T);}
          else{[r,g,b]=tempColor(r,g,b,T);}
          }
        }
      }
    }
    // Gravity field overlay (blend with element so both visible)
    if(gravityFieldOn&&!lowFx){
      const [gx,gy]=gravityAt(x,y);
      const mag=Math.min(1,Math.sqrt(gx*gx+gy*gy)/6);
      const angle=Math.atan2(gy,gx);
      const hue=(angle+Math.PI)/(2*Math.PI);
      const s=0.7,l=0.2+mag*0.5;
      const c=(1-Math.abs(2*l-1))*s;
      const X=c*(1-Math.abs((hue*6)%2-1));
      const m=l-c/2;
      let R=0,G=0,B=0;
      if(hue<1/6){R=c;G=X;B=0;} else if(hue<2/6){R=X;G=c;B=0;} else if(hue<3/6){R=0;G=c;B=X;} else if(hue<4/6){R=0;G=X;B=c;} else if(hue<5/6){R=X;G=0;B=c;} else{R=c;G=0;B=X;}
      const gr=Math.round((R+m)*255),gg=Math.round((G+m)*255),gb=Math.round((B+m)*255);
      r=Math.round(r*0.55+gr*0.45);g=Math.round(g*0.55+gg*0.45);b=Math.round(b*0.55+gb*0.45);
    }
    // Velocity overlay: direction = hue, magnitude = brightness (only where there's motion)
    if(velocityOverlayOn&&!lowFx){
      const vx=velX[i],vy=velY[i];
      const vmag=Math.min(1,Math.sqrt(vx*vx+vy*vy)/4);
      if(vmag>0.05){
        const angle=Math.atan2(vy,vx);
        const hue=(angle+Math.PI)/(2*Math.PI);
        const s=0.85,l=0.15+vmag*0.6;
        const c=(1-Math.abs(2*l-1))*s;
        const X=c*(1-Math.abs((hue*6)%2-1));
        const m=l-c/2;
        let R=0,G=0,B=0;
        if(hue<1/6){R=c;G=X;B=0;} else if(hue<2/6){R=X;G=c;B=0;} else if(hue<3/6){R=0;G=c;B=X;} else if(hue<4/6){R=0;G=X;B=c;} else if(hue<5/6){R=X;G=0;B=c;} else{R=c;G=0;B=X;}
        const vr=Math.round((R+m)*255),vg=Math.round((G+m)*255),vb=Math.round((B+m)*255);
        const blend=0.4+vmag*0.35;
        r=Math.round(r*(1-blend)+vr*blend);g=Math.round(g*(1-blend)+vg*blend);b=Math.round(b*(1-blend)+vb*blend);
      }
    }
    // Brush highlight (match selected shape); line tool shows preview of where line will go
    const ddx=x-hX,ddy=y-hY;
    if(linePreviewCells.has(i)){r=Math.min(255,r+45);g=Math.min(255,g+45);b=Math.min(255,b+45);}
    else if(inBrush(ddx,ddy,br,document.getElementById('brush-shape').value)){r=Math.min(255,r+35);g=Math.min(255,g+35);b=Math.min(255,b+35);}
    for(let dy2=0;dy2<SCALE;dy2++) for(let dx2=0;dx2<SCALE;dx2++){
      const pi=((y*SCALE+dy2)*W*SCALE+(x*SCALE+dx2))*4;
      pixels[pi]=r;pixels[pi+1]=g;pixels[pi+2]=b;pixels[pi+3]=255;
    }
  }
  ctx.putImageData(imageData,0,0);
}

let lastT=0,frames=0,fpsT=0;
const fpsEl=document.getElementById('fps');
function loop(ts){
  const dt=ts-lastT;lastT=ts;frames++;fpsT+=dt;
  if(fpsT>500){fpsEl.textContent=Math.round(frames/(fpsT/1000))+' fps';frames=0;fpsT=0;}
  const paused=document.getElementById('pause-btn').checked;
  window.simFrameCount=(window.simFrameCount||0)+1;
  const speedMode=(document.getElementById('speed-select').value||'1x');
  // When paused: sim still runs but gravity is off (no gravity / drift). When not paused: run at selected speed.
  if(paused) simulate();
  else{
    if(speedMode==='3x'){ simulate(); simulate(); simulate(); }
    else if(speedMode==='2x'){ simulate(); simulate(); }
    else if(speedMode==='1x'){ simulate(); }
    else if(speedMode==='0.5x'){ if((window.simFrameCount%2)===0) simulate(); }
    else if(speedMode==='0.25x'){ if((window.simFrameCount%4)===0) simulate(); }
    else simulate();
  }
  if(rightDrawing&&lastDrawGx>=0&&lastDrawGy>=0&&inB(lastDrawGx,lastDrawGy))applyEraseAt(lastDrawGx,lastDrawGy);
  else if(isDrawing&&lastDrawGx>=0&&lastDrawGy>=0&&inB(lastDrawGx,lastDrawGy)&&toolMode!=='drag'&&toolMode!=='line')applyToolAt(lastDrawGx,lastDrawGy);
  window.renderFrameCount=(window.renderFrameCount||0)+1;
  if(!fpsBoostOn||(window.renderFrameCount%2)===0) render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
